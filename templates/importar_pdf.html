<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Processar Lotações PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-96 text-center">
        <h2 class="font-bold text-lg mb-4">Upload de PDF</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf_file" accept=".pdf" class="mb-4 w-full">
            <button type="submit" class="bg-blue-600 text-white w-full py-2 rounded-lg font-bold hover:bg-blue-700">Gerar Excel</button>
        </form>
    </div>
</body>
</html>
