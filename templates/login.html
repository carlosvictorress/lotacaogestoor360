<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - SME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F7; } /* Fundo estilo Apple */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        /* Remove o outline padrão e adiciona um anel suave */
        input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 1px #000;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen transition-colors duration-200 dark:bg-gray-900">

    <button onclick="toggleDarkMode()" class="absolute top-6 right-6 p-2 rounded-full bg-white/50 hover:bg-white/80 dark:bg-gray-800/50 dark:hover:bg-gray-800 dark:text-white transition-all backdrop-blur-sm z-50">
        <i id="theme-icon" class="ph ph-moon text-xl"></i>
    </button>

    <div class="w-full max-w-sm p-8 bg-white rounded-3xl shadow-xl border border-gray-100 transition-all duration-300 hover:shadow-2xl dark:bg-gray-800 dark:border-gray-700">
        
        <div class="flex flex-col items-center mb-8">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Brasão Valença do Piauí" class="h-28 w-auto object-contain mb-4 dark:invert">
            
            <h2 class="text-xl font-semibold text-gray-900 tracking-tight dark:text-white">Gestão SME</h2>
            <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">Valença do Piauí</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-3 rounded-lg text-xs font-medium text-center 
                                {{ 'bg-green-50 text-green-700 border border-green-100' if category == 'success' else 'bg-red-50 text-red-600 border border-red-100' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 pl-1 dark:text-gray-400">Usuário</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-user text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" name="user" required 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 transition-all focus:bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-500 dark:focus:bg-gray-600" 
                        placeholder="Digite seu login">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 pl-1 dark:text-gray-400">Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-lock text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" name="pass" required 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 transition-all focus:bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-500 dark:focus:bg-gray-600" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-black text-white font-medium py-3.5 rounded-xl text-sm hover:bg-gray-800 transform active:scale-[0.98] transition-all duration-200 shadow-lg dark:bg-blue-600 dark:hover:bg-blue-700">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest dark:text-gray-500">Prefeitura Municipal</p>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.setItem('theme', 'light'); icon.classList.replace('ph-sun', 'ph-moon'); } 
            else { html.classList.add('dark'); localStorage.setItem('theme', 'dark'); icon.classList.replace('ph-moon', 'ph-sun'); }
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.replace('ph-moon', 'ph-sun');
        }
    </script>
</body>
</html>
